services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # mongodb here is the compose service hostname, not a secret — always points
      # within the compose network regardless of what MONGO_URI is set to for local dev
      MONGO_URI: mongodb://mongodb:27017/ai-workspace
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
